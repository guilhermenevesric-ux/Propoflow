<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PropoFlow • Confirmar e-mail</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="container">
  <div class="nav">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>PropoFlow</h1>
        <p>Confirmação de e-mail</p>
      </div>
    </div>
    <div class="actions">
      <a class="btn btn-ghost" href="/logout">Sair</a>
    </div>
  </div>

  <div class="card" style="max-width:520px; margin:0 auto;">
    <h2 class="h2">Digite o código</h2>
    <p class="small">
      Enviamos um código de 6 dígitos para: <b>{{ email }}</b><br>
      (Se não achar, veja o spam.)
    </p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if info %}
      <div class="error" style="background: rgba(79,124,255,0.15); border-color: rgba(79,124,255,0.35); color: rgba(232,238,252,0.9);">
        {{ info }}
      </div>
    {% endif %}

    <form method="post" action="/verify">
      <label>Código (6 dígitos)</label>
      <input name="code" inputmode="numeric" maxlength="6" placeholder="Ex: 123456" required>

      <div style="height:14px;"></div>
      <button class="btn" type="submit" style="width:100%;">Confirmar</button>
    </form>

    <div style="height:14px;"></div>

    <form method="post" action="/verify/resend">
      <button class="btn btn-ghost" type="submit" style="width:100%;">Reenviar código</button>
    </form>

    <p class="small" style="margin-top:12px; opacity:.75;">
      O código expira em 15 minutos.
    </p>
  </div>
</div>
</body>
</html>
