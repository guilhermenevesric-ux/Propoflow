<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PropoFlow • Algo deu errado</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:720px; margin: 60px auto;">
      <h2 class="h2">Ops… deu um erro aqui 😅</h2>
      <p class="small">
        Já estamos corrigindo. Tente de novo em alguns segundos.
      </p>

      {% if request_id %}
        <div class="pill" style="margin:12px 0;">
          ID do erro: <b style="color: rgba(232,238,252,0.95);">{{ request_id }}</b>
        </div>
      {% endif %}

      <div class="actions" style="margin-top:12px; flex-wrap:wrap;">
        <a class="btn" href="/dashboard">Voltar ao dashboard</a>
        <a class="btn btn-ghost" href="/start">Reabrir onboarding</a>
      </div>

      <p class="small" style="margin-top:14px; opacity:.7;">
        Se persistir, fale com a gente em <a href="/support">Suporte</a>.
      </p>
    </div>
  </div>
</body>
</html>
