<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PropoFlow • Suporte</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div class="container">

    <div class="nav">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>PropoFlow</h1>
          <p>Suporte</p>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-ghost" href="/dashboard">Voltar</a>
      </div>
    </div>

    <div class="card">
      <h2 class="h2">Fale com a gente</h2>
      <p class="small">Se tiver qualquer problema, chama no e-mail abaixo.</p>

      <div class="card" style="padding:14px; margin-top:12px;">
        <div style="font-weight:800; margin-bottom:6px;">Email de suporte</div>
        <div class="small" style="margin-bottom:12px;">
          <b>{{ support_email }}</b>
        </div>

        <a class="btn" href="mailto:{{ support_email }}?subject=Suporte%20PropoFlow">Enviar e-mail</a>

        {% if user and user.email %}
          <p class="small" style="margin-top:10px; opacity:.75;">
            Sua conta: {{ user.email }}
          </p>
        {% endif %}
      </div>
    </div>

    <p class="small" style="margin-top:18px; opacity:.6; text-align:center;">
      <a href="/terms">Termos</a> • <a href="/privacy">Privacidade</a> • <a href="/support">Suporte</a>
    </p>

  </div>
</body>
</html>
